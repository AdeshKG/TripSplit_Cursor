<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TripSplit{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head_extra %}{% endblock %}
</head>
<body class="ts-body">
  <nav class="navbar navbar-expand-lg ts-nav border-bottom">
    <div class="container">
      <a class="navbar-brand fw-semibold ts-brand" href="{{ url_for('index') }}">TripSplit</a>
      <span class="navbar-text small text-muted d-none d-md-inline">UPI-first expense sharing</span>
    </div>
  </nav>
  <main class="container py-4 py-md-5">
    {% block content %}{% endblock %}
  </main>
  <footer class="border-top py-4 mt-auto ts-footer">
    <div class="container small text-muted text-center">
      Built for Indian groups · SQLite · Flask · Ready for Razorpay &amp; PostgreSQL
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
          crossorigin="anonymous"></script>
  {% block scripts %}{% endblock %}
</body>
</html>

{% extends "base.html" %}
{% block title %}Group not found · TripSplit{% endblock %}
{% block content %}
<div class="text-center ts-fade-in py-5">
  <h1 class="h4 mb-3">Group not found</h1>
  <p class="text-muted mb-4">No group exists for ID <strong class="ts-mono">{{ gid }}</strong>. Check the link or start a new group.</p>
  <a href="{{ url_for('index') }}" class="btn btn-ts-primary ts-scale-hover">Create a group</a>
</div>
{% endblock %}
